<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Harvest Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="offline-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2>🌙 Welcome Back!</h2>
            <p>While you were away, your farm kept producing:</p>
            <div id="offline-report" style="color:var(--accent); margin: 15px 0; font-weight:bold;"></div>
            <button class="btn-buy" style="width:100%" onclick="document.getElementById('offline-modal').style.display='none'">Awesome!</button>
        </div>
    </div>

    <div style="text-align:right; margin-bottom:5px;">
        <button onclick="Game.resetGame()" class="btn-reset">⚠️ Reset Data</button>
    </div>

    <header>
        <div class="stats">💰 <span id="gold">0</span></div>
        <div style="text-align:center">
            <h1>Harvest Manager</h1>
            <div style="font-size:0.8rem; color:#888">XP: <span id="xp">0/100</span></div>
        </div>
        <div class="stats">⭐ Level <span id="level">1</span></div>
    </header>

    <main>
        <div class="panel">
            <h2>🌱 Fields & Trees</h2>
            <div id="plot-list" class="scroll-area"></div>
        </div>

        <div class="panel">
            <h2 style="display:flex; justify-content:space-between;">
                <span>🐔 Barns</span>
                <button class="btn-buy" style="font-size:0.7rem; padding: 2px 6px;" onclick="Game.renderShop('upgrades')">Upgrades</button>
            </h2>
            <div id="animal-list" class="scroll-area" style="height:45%"></div>
            
            <h2 style="margin-top:15px">🏭 Factory</h2>
            <div id="machine-list" class="scroll-area" style="height:45%"></div>
        </div>

        <div class="panel">
            <h2>📦 Warehouse</h2>
            <button class="btn-buy" style="width:100%; margin-bottom:10px; background:#e67e22" onclick="Game.sellAllEverything()">Sell Everything</button>
            <div id="inventory-list" class="scroll-area"></div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
